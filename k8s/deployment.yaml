apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: pratik6958/ssl-app:latest
        image: pratik6958/ssl-app:latest
        ports:
        - containerPort: 80
